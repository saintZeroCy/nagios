---

- name: Install EPEL repository (CentOS)
  dnf:
    name: epel-release
    state: present
  when: ansible_os_family == "RedHat"

- name: Install Nagios on Ubuntu
  apt:
    name: nagios4
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install Nagios on CentOS
  dnf:
    name: nagios
    state: present
  when: ansible_os_family == "RedHat"

- name: Enable and Start Nagios on Ubuntu
  service:
    name: nagios4
    state: started
    enabled: yes
  when: ansible_os_family == "Debian"

- name: Enable and Start Nagios on CentOS
  service:
    name: nagios
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat"